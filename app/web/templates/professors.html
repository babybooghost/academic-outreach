{% extends "base.html" %}
{% block title %}Professors{% endblock %}

{% block content %}
<hgroup>
    <h1>Professors</h1>
    <p>{{ professors|length }} professor{{ 's' if professors|length != 1 else '' }} found</p>
</hgroup>

<!-- Filters -->
<form method="get" action="{{ url_for('professors_list') }}" class="filter-form">
    <div class="grid">
        <label>
            Status
            <select name="status" onchange="this.form.submit()">
                <option value="">All Statuses</option>
                {% for s in statuses %}
                <option value="{{ s }}" {% if current_status == s %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            Field
            <select name="field" onchange="this.form.submit()">
                <option value="">All Fields</option>
                {% for f in fields %}
                <option value="{{ f }}" {% if current_field == f %}selected{% endif %}>{{ f }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            &nbsp;
            <button type="submit" class="outline">Filter</button>
        </label>
    </div>
</form>

{% if professors %}
<figure>
<table class="striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>University</th>
            <th>Department</th>
            <th>Field</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for p in professors %}
        <tr class="clickable-row" onclick="window.location='{{ url_for('professor_detail', prof_id=p.id) }}'">
            <td><strong>{{ p.name }}</strong></td>
            <td>{{ p.university }}</td>
            <td>{{ p.department }}</td>
            <td>{{ p.field }}</td>
            <td><span class="badge badge-{{ p.status }}">{{ p.status }}</span></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</figure>
{% else %}
<p class="empty-state">No professors match the current filters.</p>
{% endif %}
{% endblock %}
