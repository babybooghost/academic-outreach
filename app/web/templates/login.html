<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Academic Outreach</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
    (function(){
        var t = localStorage.getItem('ao_theme') || 'system';
        var p = t === 'system' ? (matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark') : t;
        document.documentElement.setAttribute('data-theme', p);
    })();
    </script>
</head>
<body>
    <div class="login-page">
        <div class="login-card" style="animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;">
            <div class="login-logo">
                <div class="logo-icon">AO</div>
                <h1>Welcome back</h1>
                <p>Sign in to your Academic Outreach account</p>
            </div>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="access_key">Access Key</label>
                    <input type="password" id="access_key" name="access_key"
                           placeholder="Paste your access key" autofocus required
                           style="text-align:center; letter-spacing:0.05em; font-family:'JetBrains Mono','Fira Code',monospace;">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding:0.8rem; font-size:0.95rem; border-radius:12px;">
                    Sign In &rarr;
                </button>
            </form>

            <div class="login-footer">
                <span>Don't have a key?</span>
                <a href="{{ url_for('signup') }}" style="color:var(--ao-primary-light); font-weight:600;">Create an account</a>
                <br>
                <a href="{{ url_for('homepage') }}" style="color:var(--ao-text-dim); font-size:0.8rem; margin-top:0.35rem; display:inline-block;">&larr; Back to home</a>
            </div>
        </div>
    </div>
</body>
</html>
